name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main
      - hugo

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true
      - run: hugo --minify
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./public
      - uses: actions/deploy-pages@v4
        with:
          # Optionally you can specify different destinations based on branch

jobs:
   build-deploy:
      runs-on: ubuntu-latest

      permissions:
         contents: read
         pages: write
         id-token: write

      steps:
         - name: Checkout repo
           uses: actions/checkout@v4

         - name: Setup Hugo
           uses: peaceiris/actions-hugo@v3
           with:
              hugo-version: "latest"
              extended: true

         - name: Build site
           run: hugo --minify

         - name: Upload artifact
           uses: actions/upload-pages-artifact@v3
           with:
              path: ./public

         - name: Deploy to GitHub Pages
           uses: actions/deploy-pages@v4
